<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospital General del Sur - Acceso Institucional</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --maroon: #6d0035;
      --maroon-hover: #8a0045;
      --azul: #0a4da6;
    }
    * { box-sizing: border-box; }
    body { 
       font-family: 'Segoe UI', system-ui, sans-serif; 
       background: #f8f9fa; 
       margin: 0; 
       display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .navbar { 
       background: var(--azul); 
       padding: 12px 32px; 
       display: flex; 
       justify-content: space-between; 
       align-items: center; 
       box-shadow: 0 2px 12px rgba(0,0,0,0.15); 
     }
    .brand { 
       color: #fff; 
       font-size: 15px; 
       font-weight: 600; 
       display: flex; 
       align-items: center; 
       gap: 8px; 
       text-decoration: none; 
     }
    .btn-regresar { 
       background: rgba(255, 255, 255, 0.15); 
       color: #fff; 
       border: 1px solid rgba(255, 255, 255, 0.25); 
       border-radius: 6px; 
       padding: 7px 16px; 
       font-size: 12px; 
       font-weight: 600; 
       text-decoration: none; 
       transition: all 0.2s; 
     }
    .btn-regresar:hover { 
       background: #fff; 
       color: var(--azul); 
     }
    .main-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card-login {
      background: #fff;
      border: none;
      border-radius: 14px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border-top: 4px solid var(--maroon);
    }
    .card-body { padding: 32px; }
    .login-icon {
      font-size: 36px;
      color: var(--maroon);
      display: block;
      text-align: center;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #212529;
      text-align: center;
      margin-bottom: 24px;
    }
    
    .form-label { font-size: 13px; font-weight: 600; color: #495057; }
    .btn-login {
      background: var(--maroon);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px;
      border-radius: 6px;
      border: none;
      transition: background 0.2s;
    }
    .btn-login:hover { background: var(--maroon-hover); color: #fff; }
    footer { 
       background: var(--azul); 
       color: #fff; 
       padding: 24px 32px; 
       display: flex; 
       justify-content: space-between; 
       align-items: center; 
       margin-top: auto;
    }
    .footer-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .footer-sub { font-size: 12px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="brand" href="/">
    <i class="bi bi-heart-pulse-fill"></i>
    HOSPITAL GENERAL SUR
  </a>
  <div class="nav-links">
    <a class="btn-regresar" href="/">
      <i class="bi bi-arrow-left-short"></i> Volver al Portal
    </a>
  </div>
</nav>

<main class="main-content">
  <div class="card card-login">
    <div class="card-body">
      <i class="bi bi-shield-lock-fill login-icon"></i>
      <h1 class="card-title">Acceso al Sistema (CU-01)</h1>
      <form id="loginForm" novalidate>
        
        <div class="mb-3">
          <label class="form-label" for="tipoPersonal">Rol de Usuario (RN-08)</label>
          <select class="form-select" id="tipoPersonal" name="tipo_personal">
            <option value="recepcionista" selected>Recepcionista (ACT-01)</option>
            <option value="laboratorista">Laboratorista (ACT-02)</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label" for="usuarioCorreo">Correo Institucional</label>
          <input type="email" class="form-control" id="usuarioCorreo" placeholder="ejemplo@ipn.mx" required>
          <small id="errorUsuario" class="text-danger fw-bold mt-1 d-block"></small>
        </div>

        <div class="mb-3">
          <label class="form-label" for="passwordAdmin">Contraseña</label>
          <input type="password" id="passwordAdmin" class="form-control" placeholder="••••••" required>
          <small id="errorPassword" class="text-danger fw-bold mt-1 d-block"></small>
        </div>

        <button type="submit" class="btn btn-login w-100 mt-2">
          Iniciar Sesión
        </button>
      </form>
      
      <p id="mensajeAdmin" class="mt-3 text-center fw-bold"></p>
    </div>
  </div>
</main>

<footer>
  <div>
    <div class="footer-title"><i class="bi bi-heart-pulse-fill me-2"></i>Hospital General del Sur</div>
    <div class="footer-sub">© 2026 • Todos los derechos reservados • Sistema Centralizado</div>
  </div>
</footer>

<script>
  document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();

    const rol = document.getElementById('tipoPersonal').value;
    const correo = document.getElementById('usuarioCorreo').value.trim();
    const contrasena = document.getElementById('passwordAdmin').value;
    
    const errorUsuario = document.getElementById('errorUsuario');
    const errorPassword = document.getElementById('errorPassword');
    const mensajeAdmin = document.getElementById('mensajeAdmin');

    // Limpieza de estados anteriores
    errorUsuario.textContent = '';
    errorPassword.textContent = '';
    mensajeAdmin.textContent = '';
    mensajeAdmin.className = "mt-3 text-center fw-bold";

    const regexCorreoInst = /^[a-zA-Z0-9._-]+@ipn\.mx$/;
    let valido = true;

    // 1. Validaciones de formato inicial
    if (!correo) {
      errorUsuario.textContent = 'El correo electrónico es obligatorio.';
      valido = false;
    } else if (!regexCorreoInst.test(correo)) {
      errorUsuario.textContent = 'Formato inválido. Debe utilizar su dominio @ipn.mx';
      valido = false;
    }

    if (contrasena.length < 6) {
      errorPassword.textContent = 'La contraseña debe tener al menos 6 caracteres.';
      valido = false;
    }

    if (!valido) return false;

    // 2. Petición POST al Backend (Flask) enviando JSON
    try {
      mensajeAdmin.className = "mt-3 text-center fw-bold text-info";
      mensajeAdmin.textContent = "Validando credenciales...";

      const response = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ correo: correo, contrasena: contrasena, rol: rol })
      });

      const data = await response.json();

      if (response.ok) {
        // Redirección exitosa según el rol
        mensajeAdmin.className = "mt-3 text-center fw-bold text-success";
        mensajeAdmin.textContent = "MSG-01: Inicio de sesión exitoso. Redirigiendo...";
        setTimeout(() => {
          window.location.href = data.redirect_url;
        }, 1200);
      } else {
        // Error de credenciales o permisos
        mensajeAdmin.className = "mt-3 text-center fw-bold text-danger";
        mensajeAdmin.textContent = "ERR-01: " + (data.error || "Usuario o contraseña incorrectos.");
      }
    } catch (error) {
      // Error si Flask no está corriendo o hay problemas de red
      mensajeAdmin.className = "mt-3 text-center fw-bold text-danger";
      mensajeAdmin.textContent = "Error de conexión con el servidor. Verifica que el backend esté en ejecución.";
    }
  });
</script>

</body>
</html>
